<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catch</title>
    <link rel="stylesheet" href="/catch/styles.css?v=8" />
  </head>
  <body>
    <div class="app">
      <section class="screen screen-entry" id="entryScreen">
        <div class="entry-shell">
          <div class="brand">
            <span class="brand-mark">C</span>
            <span>CATCH</span>
          </div>

          <section class="entry-form">
            <div class="game-picker">
              <a class="button-link button-secondary" href="/">LIAR</a>
              <a class="button-link button-secondary" href="/bang/">BANG</a>
              <a class="button-link button-secondary" href="/davinci/">DAVINCI</a>
              <a class="button-link button-secondary" href="/omok/">OMOK</a>
              <a class="button-link button-secondary" href="/halli/">HALLI</a>
              <a class="button-link button-secondary" href="/yut/">YUT</a>
              <a class="button-link button-secondary" href="/memory/">MEMORY</a>
              <button type="button" disabled>CATCH</button>
            </div>

            <div class="field-group">
              <label for="nameInput">닉네임</label>
              <input id="nameInput" maxlength="16" autocomplete="nickname" />
            </div>

            <div class="field-group">
              <label for="targetPlayerCountInput">목표 인원</label>
              <select id="targetPlayerCountInput">
                <option value="2" selected>2명</option>
                <option value="3">3명</option>
                <option value="4">4명</option>
                <option value="5">5명</option>
              </select>
            </div>

            <div class="field-group">
              <label for="roundCountInput">라운드</label>
              <select id="roundCountInput">
                <option value="1" selected>1바퀴</option>
                <option value="2">2바퀴</option>
                <option value="3">3바퀴</option>
              </select>
            </div>

            <div class="field-group">
              <label>기본 규칙</label>
              <div class="guide-box">
                한 사람만 그림을 그리고, 나머지는 채팅으로 정답을 맞힙니다. 모든 라운드가 끝나면 점수가 가장 높은 플레이어가 이깁니다.
              </div>
            </div>

            <div class="field-group">
              <label for="roomInput">방 코드</label>
              <input id="roomInput" maxlength="5" spellcheck="false" autocapitalize="characters" />
            </div>

            <div class="actions">
              <button id="createRoomButton" type="button">방 만들기</button>
              <button id="joinRoomButton" type="button">입장</button>
            </div>

            <p class="entry-status" id="entryStatus"></p>
          </section>
        </div>
      </section>

      <section class="screen screen-game" id="gameScreen" hidden>
        <header class="game-topbar">
          <div class="topbar-left">
            <div class="brand">
              <span class="brand-mark">C</span>
              <span>CATCH</span>
            </div>
            <div class="chip" id="roomBadge">-</div>
            <div class="chip" id="playerBadge">-</div>
            <div class="chip" id="roundBadge">-</div>
            <div class="chip" id="phaseBadge">-</div>
            <div class="chip chip-status" id="statusBadge">-</div>
          </div>

          <div class="topbar-actions">
            <div class="bot-tools" id="botTools" hidden>
              <input id="botCountInput" type="number" min="1" max="4" value="1" />
              <button id="addBotButton" class="button-secondary" type="button">봇 추가</button>
            </div>
            <button id="startButton" type="button" hidden>시작</button>
            <button id="resetButton" type="button" hidden>다음 판</button>
            <button id="leaveButton" class="button-secondary" type="button">방 나가기</button>
          </div>
        </header>

        <main class="game-layout">
          <aside class="chat-log-panel">
            <div class="chat-log-shell">
              <div class="chat-log-head">
                <strong>채팅 로그</strong>
              </div>
              <div class="chat-log-list" id="chatLogList"></div>
            </div>
          </aside>

          <section class="board-panel">
            <div class="board-shell">
              <div class="board-head">
                <div class="board-chip-group">
                  <div class="chip" id="topicBadge" hidden>-</div>
                  <div class="chip chip-word" id="wordBadge">-</div>
                  <div class="chip" id="timerBadge">-</div>
                </div>
              </div>

              <div class="canvas-shell" id="canvasShell">
                <canvas id="drawingCanvas"></canvas>
                <div class="canvas-empty" id="canvasEmpty">게임을 시작하면 그림판이 열립니다.</div>
                <div class="topic-notice" id="topicNotice" hidden>
                  <div class="topic-notice-card">
                    <strong class="topic-notice-title" id="topicNoticeTitle"></strong>
                    <div class="topic-notice-word" id="topicNoticeWord"></div>
                  </div>
                </div>
              </div>

              <div class="tool-row">
                <div class="color-tools" id="colorTools">
                  <button type="button" class="tool-color is-active" data-color="#111111" aria-label="검정"></button>
                  <button type="button" class="tool-color" data-color="#555555" aria-label="회색"></button>
                  <button type="button" class="tool-color" data-color="#999999" aria-label="밝은 회색"></button>
                </div>

                <label class="size-tool">
                  <span>굵기</span>
                  <input id="brushSizeInput" type="range" min="2" max="18" value="6" />
                </label>

                <button id="undoButton" class="button-secondary" type="button">되돌리기</button>
                <button id="redoButton" class="button-secondary" type="button">다시 실행</button>
                <button id="clearCanvasButton" class="button-secondary" type="button">지우기</button>
              </div>
            </div>
          </section>

          <aside class="side-panel">
            <section class="player-panel">
              <div class="panel-head">
                <strong>플레이어</strong>
              </div>
              <div class="player-list" id="playerList"></div>
            </section>

            <section class="composer-panel">
              <form class="chat-form" id="chatForm">
                <input
                  id="chatInput"
                  type="text"
                  maxlength="140"
                  placeholder="정답 또는 채팅 입력"
                  autocomplete="off"
                  autocapitalize="none"
                  spellcheck="false"
                  lang="ko"
                  inputmode="text"
                  enterkeyhint="send"
                />
                <button id="sendChatButton" type="submit">전송</button>
              </form>
              <p class="chat-status" id="chatStatus"></p>
            </section>
          </aside>
        </main>
      </section>
    </div>

    <script src="/shared/adfit.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/session.js"></script>
    <script src="/catch/app.js?v=8"></script>
  </body>
</html>
