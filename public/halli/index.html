<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halli Galli</title>
    <link rel="stylesheet" href="/halli/styles.css?v=23" />
  </head>
  <body>
    <div class="app">
      <section class="screen screen-entry" id="entryScreen">
        <div class="entry-shell">
          <div class="brand">
            <span class="brand-mark">H</span>
            <span>HALLI</span>
          </div>

          <section class="entry-form">
            <div class="game-picker">
              <a class="button-link button-secondary" href="/">LIAR</a>
              <a class="button-link button-secondary" href="/bang/">BANG</a>
              <a class="button-link button-secondary" href="/davinci/">DAVINCI</a>
              <a class="button-link button-secondary" href="/omok/">OMOK</a>
              <button type="button" disabled>HALLI</button>
              <a class="button-link button-secondary" href="/yut/">YUT</a>
              <a class="button-link button-secondary" href="/memory/">MEMORY</a>
            </div>

            <div class="field-group">
              <label for="nameInput">닉네임</label>
              <input id="nameInput" maxlength="16" autocomplete="nickname" />
            </div>

            <div class="field-group">
              <label for="targetPlayerCountInput">최대 인원</label>
              <select id="targetPlayerCountInput">
                <option value="2">2명</option>
                <option value="3">3명</option>
                <option value="4" selected>4명</option>
                <option value="5">5명</option>
                <option value="6">6명</option>
              </select>
            </div>

            <div class="field-group">
              <label>기본 규칙</label>
              <div class="guide-box" id="ruleGuide">
                차례대로 카드를 뒤집고, 공개된 카드들 중 같은 과일의 합이 정확히 5가 되면 먼저 종을 칩니다.
                맞히면 공개 카드 전체를 가져가고, 틀리면 다른 플레이어마다 1장씩 나눠줍니다.
              </div>
            </div>

            <div class="field-group">
              <label for="roomInput">방 코드</label>
              <input id="roomInput" maxlength="5" spellcheck="false" autocapitalize="characters" />
            </div>

            <div class="actions">
              <button id="createRoomButton" type="button">방 만들기</button>
              <button id="joinRoomButton" type="button">입장</button>
            </div>

            <p class="entry-status" id="entryStatus"></p>
          </section>
        </div>
      </section>

      <section class="screen screen-game" id="gameScreen" hidden>
        <header class="game-topbar">
          <div class="topbar-left">
            <div class="brand">
              <span class="brand-mark">H</span>
              <span>HALLI</span>
            </div>
            <div class="chip" id="roomBadge">-</div>
            <div class="chip" id="playerBadge">-</div>
            <div class="chip" id="phaseBadge">-</div>
            <div class="chip chip-status" id="statusBadge">-</div>
          </div>

          <div class="topbar-actions">
            <div class="bot-tools" id="botTools" hidden>
              <input id="botCountInput" type="number" min="1" max="4" value="1" />
              <button id="addBotButton" class="button-secondary" type="button">봇 추가</button>
            </div>
            <button id="startButton" type="button" hidden>시작</button>
            <button id="resetButton" type="button" hidden>대기실로</button>
            <button id="leaveButton" class="button-secondary" type="button">방 나가기</button>
          </div>
        </header>

        <main class="game-layout">
          <aside class="chat-log-panel">
            <div class="chat-log-shell">
              <div class="chat-log-head">
                <strong>채팅 로그</strong>
              </div>
              <div class="chat-log-list" id="chatLogList"></div>
            </div>
          </aside>

          <section class="table-panel">
            <div class="table-stage" id="tableStage">
              <div class="seat-layer" id="seatLayer"></div>

              <section class="center-zone">
                <button id="bellButton" class="bell-button" type="button">
                  <span class="bell-icon">BELL</span>
                  <span class="bell-label">종 치기</span>
                </button>
              </section>

              <section class="self-dock" id="selfDock">
                <button id="flipButton" type="button">카드 뒤집기</button>
                <section class="self-seat-area" id="selfSeatArea"></section>
              </section>

              <section class="seat-chat-composer" id="seatChatComposer" hidden>
                <form class="seat-chat-form" id="chatForm">
                  <input
                    id="chatInput"
                    type="text"
                    maxlength="140"
                    placeholder="채팅 입력"
                    autocomplete="off"
                    autocapitalize="none"
                    spellcheck="false"
                    lang="ko"
                    inputmode="text"
                    enterkeyhint="send"
                  />
                  <button id="sendChatButton" type="submit">전송</button>
                </form>
                <p class="chat-status" id="chatStatus"></p>
              </section>
            </div>
          </section>
        </main>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/session.js"></script>
    <script src="/halli/app.js?v=23"></script>
  </body>
</html>
