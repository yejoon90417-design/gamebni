<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>윷놀이</title>
    <link rel="stylesheet" href="/yut/styles.css?v=32" />
  </head>
  <body>
    <div class="app">
      <section class="screen screen-entry" id="entryScreen">
        <div class="entry-shell">
          <div class="brand">
            <span class="brand-mark">Y</span>
            <span>윷놀이</span>
          </div>

          <section class="entry-form">
            <div class="game-picker">
              <a class="button-link button-secondary" href="/">LIAR</a>
              <a class="button-link button-secondary" href="/bang/">BANG</a>
              <a class="button-link button-secondary" href="/davinci/">DAVINCI</a>
              <a class="button-link button-secondary" href="/omok/">OMOK</a>
              <a class="button-link button-secondary" href="/halli/">HALLI</a>
              <button type="button" disabled>윷놀이</button>
              <a class="button-link button-secondary" href="/memory/">MEMORY</a>
              <a class="button-link button-secondary" href="/catch/">CATCH</a>
            </div>

            <div class="field-group">
              <label for="nameInput">닉네임</label>
              <input id="nameInput" maxlength="16" autocomplete="nickname" />
            </div>

            <div class="field-group">
              <label for="targetPlayerCountSelect">목표 인원</label>
              <select id="targetPlayerCountSelect">
                <option value="2" selected>2명</option>
                <option value="3">3명</option>
                <option value="4">4명</option>
                <option value="5">5명</option>
              </select>
            </div>

            <div class="field-group">
              <label>기본 규칙</label>
              <div class="guide-box" id="ruleGuide">
                빽도를 사용합니다. 상대 말을 잡으면 한 번 더 던지고, 같은 칸의 내 말은 업어서 함께 움직입니다.
              </div>
            </div>

            <div class="field-group">
              <label for="roomInput">방 코드</label>
              <input id="roomInput" maxlength="5" spellcheck="false" autocapitalize="characters" />
            </div>

            <div class="actions">
              <button id="createRoomButton" type="button">방 만들기</button>
              <button id="joinRoomButton" type="button">입장</button>
            </div>

            <p class="entry-status" id="entryStatus"></p>
          </section>
        </div>
      </section>

      <section class="screen screen-game" id="gameScreen" hidden>
        <header class="game-topbar">
          <div class="topbar-left">
            <div class="brand">
              <span class="brand-mark">Y</span>
              <span>윷놀이</span>
            </div>
            <div class="chip" id="roomBadge">-</div>
            <div class="chip" id="playerBadge">-</div>
            <div class="chip" id="phaseBadge">-</div>
            <div class="chip chip-status" id="statusBadge">-</div>
          </div>

          <div class="topbar-actions">
            <div class="bot-tools" id="botTools" hidden>
              <input id="botCountInput" type="number" min="1" max="2" value="1" />
              <button id="addBotButton" class="button-secondary" type="button">봇 추가</button>
            </div>
            <button id="leaveButton" class="button-secondary" type="button">방 나가기</button>
          </div>
        </header>

        <main class="game-layout">
          <aside class="chat-log-panel">
            <div class="chat-log-shell">
              <div class="chat-log-head">
                <strong>채팅 로그</strong>
              </div>
              <div class="chat-log-list" id="chatLogList"></div>
              <section class="seat-chat-composer chat-log-composer" id="seatChatComposer" hidden>
                <form class="seat-chat-form" id="chatForm">
                  <input
                    id="chatInput"
                    type="text"
                    maxlength="140"
                    placeholder="채팅 입력"
                    autocomplete="off"
                    autocapitalize="none"
                    spellcheck="false"
                    lang="ko"
                    inputmode="text"
                    enterkeyhint="send"
                  />
                  <button id="sendChatButton" type="submit">전송</button>
                </form>
                <p class="chat-status" id="chatStatus"></p>
              </section>
            </div>
          </aside>

          <section class="board-panel">
            <div class="board-stage">
              <div class="board-surface">
                <div class="board-shell">
                  <svg class="board-svg" id="boardSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
                  <div class="board-nodes" id="boardNodes"></div>
                  <div class="board-animation-layer" id="boardAnimationLayer"></div>
                  <div class="spot-picker" id="spotPicker"></div>
                </div>
                <div class="seat-layer" id="seatLayer"></div>
              </div>
            </div>
          </section>

          <aside class="control-panel">
            <section class="control-card board-info-card">
              <p class="board-meta-eyebrow">차례</p>
              <div class="board-meta">
                <p class="board-meta-title" id="boardMetaTitle">대기실</p>
                <p class="board-meta-text" id="boardMetaText">인원이 모이면 시작 버튼으로 판을 엽니다.</p>
              </div>
              <p class="recent-action" id="recentActionText">-</p>
            </section>
            <section class="control-card throw-card">
              <p class="control-eyebrow">윷 던지기</p>
              <div class="throw-stage" id="throwStage">
                <div class="throw-arena" id="throwArena"></div>
                <p class="throw-result" id="throwResult">대기</p>
                <p class="throw-prompt" id="throwPrompt">차례가 오면 윷을 던지세요.</p>
                <div class="roll-queue throw-roll-queue" id="rollQueue"></div>
              </div>
              <div class="throw-actions">
                <button id="startButton" type="button" hidden>시작</button>
                <button id="throwButton" type="button" hidden>던지기</button>
                <button id="discardRollButton" class="button-secondary" type="button" hidden>버리기</button>
                <button id="resetButton" type="button" hidden>다시하기</button>
              </div>
            </section>
            <div class="move-options" id="moveOptions"></div>
            <div class="player-list" id="playerList"></div>
          </aside>
        </main>
      </section>
    </div>

    <script src="/shared/adfit.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/session.js"></script>
    <script src="/yut/app.js?v=32"></script>
  </body>
</html>
